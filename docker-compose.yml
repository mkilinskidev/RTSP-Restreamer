services:
  restreamer:
    build: .
    env_file:
      - path: .env
        format: raw
    expose:
      - "8000"
    environment:
      STREAM_BACKEND: ${STREAM_BACKEND:-gstreamer}
      GSTREAMER_TRANSCODE: ${GSTREAMER_TRANSCODE:-true}
      GSTREAMER_VIDEO_BITRATE: ${GSTREAMER_VIDEO_BITRATE:-2500}
      GSTREAMER_VIDEO_WIDTH: ${GSTREAMER_VIDEO_WIDTH:-1920}
      GSTREAMER_VIDEO_HEIGHT: ${GSTREAMER_VIDEO_HEIGHT:-1080}
      GSTREAMER_VIDEO_FPS: ${GSTREAMER_VIDEO_FPS:-25}
      FFMPEG_TRANSCODE: ${FFMPEG_TRANSCODE:-false}
      HLS_SEGMENT_TYPE: ${HLS_SEGMENT_TYPE:-mpegts}
      HLS_SEGMENT_SECONDS: ${HLS_SEGMENT_SECONDS:-2}
      HLS_LIST_SIZE: ${HLS_LIST_SIZE:-6}
      FFMPEG_RESTART_SECONDS: ${FFMPEG_RESTART_SECONDS:-5}
    restart: unless-stopped
